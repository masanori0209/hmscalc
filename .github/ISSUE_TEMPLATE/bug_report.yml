---
name: Bug report
description: Report incorrect behavior or a crash
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Steps to reproduce and expected vs actual behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: hmscalc version
      placeholder: e.g. 0.7.0
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12
    validations:
      required: true
